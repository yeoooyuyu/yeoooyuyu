<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chromatic Lens Canvas</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg-color: #f8f9fa; }
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: 'Manrope', sans-serif;
  }
  .canvas {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    z-index: 1;
  }
  .orb:hover {
    transform: scale(1.1) !important;
    z-index: 10;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  }
  .tooltip {
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(8px);
    padding: 8px 14px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    border: 1px solid rgba(0,0,0,0.05);
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s ease;
    white-space: nowrap;
    text-align: center;
    z-index: 100;
  }
  .orb:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .tooltip-id {
    font-size: 10px;
    font-weight: 700;
    color: #2142B2;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }
  .tooltip-name {
    font-size: 12px;
    font-weight: 500;
    color: #333;
  }
  .tooltip-meta {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(20px, -20px); }
    50%  { transform: translate(-15px, 30px); }
    75%  { transform: translate(-25px, -15px); }
    100% { transform: translate(0, 0); }
  }
</style>
</head>

<main class="canvas" id="canvas"></main>

  {"id":34,"filename":"스크린샷 2025-11-19 오후 6.49.42","size_mb":0.9,"brightness_percent":90.9,"category":"스크린샷","colors":["#ffffff","#c9c9c6","#e4e7eb"]}
];

const canvas = document.getElementById('canvas');
const minSize = 40, maxSize = 280;

function seededRandom(seed) {
  let x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

rawData.forEach((item, idx) => {
  const orb = document.createElement('div');
  orb.className = 'orb';

  const normSize = Math.min(item.size_mb / 5.5, 1);
  const normBright = item.brightness_percent / 100;
  let scale = Math.pow(normSize * 0.5 + normBright * 0.5, 1.2);
  const finalSize = minSize + scale * (maxSize - minSize);

  const x = seededRandom(idx * 3) * 88;
  const y = seededRandom(idx * 3 + 1) * 88;
  const c1 = item.colors[0], c2 = item.colors[1] || c1, c3 = item.colors[2] || c2;

  orb.style.cssText = `width:${finalSize}px;height:${finalSize}px;left:${x}%;top:${y}%;background:radial-gradient(circle at 35% 35%,${c1},${c2} 60%,${c3});animation:drift ${12 + seededRandom(idx*3+2)*20}s ease-in-out infinite alternate;animation-delay:${-(seededRandom(idx)*20)}s;`;

  orb.innerHTML = `<div class="tooltip">
    <div class="tooltip-id">ID ${String(item.id).padStart(2,'0')} · ${item.category}</div>
    <div class="tooltip-name">${item.filename}</div>
    <div class="tooltip-meta">${item.size_mb}MB · 밝기 ${item.brightness_percent}%</div>
  </div>`;

  canvas.appendChild(orb);
});
</script>
</body>
</html>
