<!DOCTYPE html>

<meta charset="utf-8"/>

<title>Chromatic Lens Canvas</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root { --bg-color: #f8f9fa; }
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: 'Manrope', sans-serif;
  }
  .canvas {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-radius 0.4s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    z-index: 1;
  }
  .orb:hover {
    transform: scale(1.1) !important;
    z-index: 10;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    animation: ripple 1.2s ease-in-out infinite alternate !important;
  }
  .tooltip {
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(8px);
    padding: 8px 14px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    border: 1px solid rgba(0,0,0,0.05);
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s ease;
    white-space: nowrap;
    text-align: center;
    z-index: 100;
  }
  .orb:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .tooltip-id {
    font-size: 10px;
    font-weight: 700;
    color: #2142B2;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }
  .tooltip-name {
    font-size: 12px;
    font-weight: 500;
    color: #333;
  }
  .tooltip-meta {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  /* Physics handled by JS */
  @keyframes ripple {
    0% { border-radius: 50%; }
    33% { border-radius: 55% 45% 58% 42% / 48% 52% 45% 55%; }
    66% { border-radius: 46% 54% 45% 55% / 55% 45% 56% 44%; }
    100% { border-radius: 52% 48% 55% 45% / 46% 54% 43% 57%; }
  }
</style>
</head>
<body>
<main class="canvas" id="canvas"></main>

  {"id":31,"filename":"페이퍼즈_대지 1","size_mb":1.4,"brightness_percent":93.1,"category":"작업물","colors":["#ffffff","#fde6ea","#e1ddd1"]},
  {"id":32,"filename":"스크린샷 2025-12-09 오후 8.06.55","size_mb":0.9,"brightness_percent":96.8,"category":"스크린샷","colors":["#ffffff","#f8ebe0","#f9fafd"]},
  {"id":33,"filename":"스크린샷 2025-12-20 오후 12.46.42","size_mb":0.8,"brightness_percent":93.6,"category":"스크린샷","colors":["#ffffff","#d5edfd","#abc7db"]},
  {"id":34,"filename":"스크린샷 2025-11-19 오후 6.49.42","size_mb":0.9,"brightness_percent":90.9,"category":"스크린샷","colors":["#ffffff","#c9c9c6","#e4e7eb"]}

const canvas = document.getElementById('canvas');
const minSize = 40, maxSize = 280;

function seededRandom(seed) {
  let x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

const orbDataList = [];

rawData.forEach((item, idx) => {
  const orb = document.createElement('div');
  orb.className = 'orb';

  const normSize = Math.min(item.size_mb / 5.5, 1);
  const normBright = item.brightness_percent / 100;
  let viewScale = Math.pow(normSize * 0.5 + normBright * 0.5, 1.2);
  const finalSize = minSize + viewScale * (maxSize - minSize);

  const x = (seededRandom(idx * 3) * 88 / 100) * window.innerWidth;
  const y = (seededRandom(idx * 3 + 1) * 88 / 100) * window.innerHeight;
  const c1 = item.colors[0], c2 = item.colors[1] || c1, c3 = item.colors[2] || c2;

  orb.style.cssText = `width:${finalSize}px;height:${finalSize}px;left:${x}px;top:${y}px;background:radial-gradient(circle at 35% 35%,${c1},${c2} 60%,${c3});`;

  orb.innerHTML = `<div class="tooltip">
    <div class="tooltip-id">ID ${String(item.id).padStart(2,'0')} · ${item.category}</div>
    <div class="tooltip-name">${item.filename}</div>
    <div class="tooltip-meta">${item.size_mb}MB · 밝기 ${item.brightness_percent}%</div>
  </div>`;

  canvas.appendChild(orb);

  let angle = seededRandom(idx * 4) * Math.PI * 2;
  let speed = 0.4 + seededRandom(idx * 5) * 0.6;
  let orbObj = {
    el: orb,
    x: x,
    y: y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    radius: finalSize / 2,
    mass: Math.PI * Math.pow(finalSize / 2, 2),
    baseSpeed: speed,
    isHovered: false,
    isDragged: false,
    ignoreHover: false,
    dragOffsetX: 0,
    dragOffsetY: 0
  };

  orb.addEventListener('mouseenter', () => orbObj.isHovered = true);
  orb.addEventListener('mouseleave', () => {
    orbObj.isHovered = false;
    orbObj.ignoreHover = false;
  });
  orb.addEventListener('mousedown', (e) => {
    orbObj.isDragged = true;
    orbObj.dragOffsetX = e.clientX - orbObj.x;
    orbObj.dragOffsetY = e.clientY - orbObj.y;
    orb.style.zIndex = 100;
  });

  orbDataList.push(orbObj);
});

window.addEventListener('mousemove', (e) => {
  for (let orbObj of orbDataList) {
    if (orbObj.isDragged) {
      orbObj.x = e.clientX - orbObj.dragOffsetX;
      orbObj.y = e.clientY - orbObj.dragOffsetY;
    }
  }
});

window.addEventListener('mouseup', () => {
  for (let orbObj of orbDataList) {
    if (orbObj.isDragged) {
      orbObj.isDragged = false;
      orbObj.el.style.zIndex = '';
      if (Math.hypot(orbObj.vx, orbObj.vy) > orbObj.baseSpeed * 2) {
        orbObj.ignoreHover = true;
      }
    }
  }
});

function updatePhysics() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  for (let i = 0; i < orbDataList.length; i++) {
    let o = orbDataList[i];
    let effHovered = o.isHovered && !o.ignoreHover;
    
    if (o.isDragged) {
      o.vx = o.x - (o.lastFrameX === undefined ? o.x : o.lastFrameX);
      o.vy = o.y - (o.lastFrameY === undefined ? o.y : o.lastFrameY);
      o.lastFrameX = o.x;
      o.lastFrameY = o.y;
    } else {
      o.lastFrameX = undefined;
      o.lastFrameY = undefined;
      
      if (!effHovered) {
        o.x += o.vx;
        o.y += o.vy;

        let cx = o.x + o.radius;
        let cy = o.y + o.radius;

        if (cx - o.radius < 0) { 
          o.vx *= -1; 
          o.x = 0; 
        } else if (cx + o.radius > W) { 
          o.vx *= -1; 
          o.x = W - o.radius * 2; 
        }

        if (cy - o.radius < 0) { 
          o.vy *= -1; 
          o.y = 0; 
        } else if (cy + o.radius > H) { 
          o.vy *= -1; 
          o.y = H - o.radius * 2; 
        }

        let speed = Math.hypot(o.vx, o.vy);
        if (speed > 0) {
          o.vx += (o.vx / speed) * (o.baseSpeed - speed) * 0.02;
          o.vy += (o.vy / speed) * (o.baseSpeed - speed) * 0.02;
        } else {
          let angle = Math.random() * Math.PI * 2;
          o.vx = Math.cos(angle) * o.baseSpeed;
          o.vy = Math.sin(angle) * o.baseSpeed;
        }
      }
    }
  }

  for (let i = 0; i < orbDataList.length; i++) {
    for (let j = i + 1; j < orbDataList.length; j++) {
      let o1 = orbDataList[i];
      let o2 = orbDataList[j];

      let c1x = o1.x + o1.radius;
      let c1y = o1.y + o1.radius;
      let c2x = o2.x + o2.radius;
      let c2y = o2.y + o2.radius;

      let dx = c2x - c1x;
      let dy = c2y - c1y;
      let dist = Math.hypot(dx, dy);
      let minDist = o1.radius + o2.radius;

      if (dist < minDist) {
        let overlap = minDist - dist;
        let nx = dx / dist;
        let ny = dy / dist;

        let effHovered1 = o1.isHovered && !o1.ignoreHover;
        let effHovered2 = o2.isHovered && !o2.ignoreHover;
        let fixed1 = o1.isDragged || effHovered1;
        let fixed2 = o2.isDragged || effHovered2;

        let invM1 = fixed1 ? 0 : 1 / o1.mass;
        let invM2 = fixed2 ? 0 : 1 / o2.mass;
        
        if (invM1 === 0 && invM2 === 0) continue;

        let m1Ratio = invM1 / (invM1 + invM2);
        let m2Ratio = invM2 / (invM1 + invM2);

        o1.x -= nx * overlap * m1Ratio;
        o1.y -= ny * overlap * m1Ratio;
        o2.x += nx * overlap * m2Ratio;
        o2.y += ny * overlap * m2Ratio;

        let v1x = (fixed1 && !o1.isDragged) ? 0 : o1.vx;
        let v1y = (fixed1 && !o1.isDragged) ? 0 : o1.vy;
        let v2x = (fixed2 && !o2.isDragged) ? 0 : o2.vx;
        let v2y = (fixed2 && !o2.isDragged) ? 0 : o2.vy;

        let kx = v1x - v2x;
        let ky = v1y - v2y;
        let velAlongNormal = kx * nx + ky * ny;

        if (velAlongNormal > 0) {
          let e = 0.3; // 30% elasticity
          let j = (1 + e) * velAlongNormal;
          j /= (invM1 + invM2);

          let impulseX = j * nx;
          let impulseY = j * ny;

          if (!fixed1) {
            o1.vx -= impulseX * invM1;
            o1.vy -= impulseY * invM1;
          }
          if (!fixed2) {
            o2.vx += impulseX * invM2;
            o2.vy += impulseY * invM2;
          }
        }
      }
    }
  }

  for (let i = 0; i < orbDataList.length; i++) {
    let o = orbDataList[i];
    o.el.style.left = o.x + 'px';
    o.el.style.top = o.y + 'px';
  }

  requestAnimationFrame(updatePhysics);
}

requestAnimationFrame(updatePhysics);
</script>
</body>
</html>
